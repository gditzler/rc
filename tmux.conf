# =============================================================================
# tmux.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Prefix key
# -----------------------------------------------------------------------------
unbind C-b
set -g prefix C-s
bind C-s send-prefix        # Ctrl+s twice to send literal Ctrl+s to apps

# -----------------------------------------------------------------------------
# General settings
# -----------------------------------------------------------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # True color support

set -g history-limit 50000          # Large scrollback for long jobs
set -g display-time 4000            # Status messages stay visible for 4s
set -g status-interval 5            # Refresh status bar every 5s
set -g focus-events on              # Pass focus events to apps (Neovim, etc.)
set -sg escape-time 0               # No delay on Escape (important for Vim/Zed)
set -g base-index 1                 # Start window numbering at 1
setw -g pane-base-index 1           # Start pane numbering at 1
set -g renumber-windows on          # Re-number windows when one is closed

# -----------------------------------------------------------------------------
# Mouse support
# -----------------------------------------------------------------------------
set -g mouse on

# -----------------------------------------------------------------------------
# Vi-mode copy
# -----------------------------------------------------------------------------
setw -g mode-keys vi

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"   # macOS clipboard
bind -T copy-mode-vi q   send -X cancel

# Enter copy mode with prefix+[ (default) or prefix+Escape
bind Escape copy-mode

# -----------------------------------------------------------------------------
# Key bindings — splits and windows
# -----------------------------------------------------------------------------
# Intuitive split keys (opens in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# -----------------------------------------------------------------------------
# Pane navigation — Vim-style
# -----------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (hold prefix and repeat)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# -----------------------------------------------------------------------------
# Status bar
# -----------------------------------------------------------------------------
set -g status-position bottom
set -g status-justify left

# Colors (works with 256-color + true color)
set -g status-style "bg=#1e2030,fg=#c8d3f5"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#82aaff,fg=#1e2030,bold] #S #[bg=#1e2030,fg=#82aaff]"

# Right: user@host | date | time
set -g status-right-length 80
set -g status-right "#[fg=#636da6]│ #[fg=#c3e88d]#{pane_current_path} #[fg=#636da6]│ #[fg=#c8d3f5]%a %b %d #[fg=#636da6]│ #[fg=#c8d3f5,bold]%H:%M"

# Window list style
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[bg=#82aaff,fg=#1e2030,bold] #I:#W #[bg=#1e2030,fg=#82aaff]"
setw -g window-status-style          "fg=#636da6"
setw -g window-status-current-style  "fg=#82aaff"

# Pane borders
set -g pane-border-style        "fg=#2f334d"
set -g pane-active-border-style "fg=#82aaff"

# Message / command bar
set -g message-style "bg=#82aaff,fg=#1e2030,bold"

